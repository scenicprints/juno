name: Juno notifications

# Sends Juno's daily push notifications (period-soon, fertile window open/close, mood dip).
# Requires the FIREBASE_SERVICE_ACCOUNT secret (a Firebase service-account JSON).
on:
  schedule:
    # every 15 min: the daily digest fires once (gated to the user's local morning + de-duped),
    # and the temperature reminder fires within ~15 min of the user's chosen local time.
    # (Public repo → Actions minutes are free. GitHub cron is UTC and can run a few minutes late.)
    - cron: '*/15 * * * *'
  workflow_dispatch:      # allows manual "Run workflow" for testing
    inputs:
      test:
        description: 'Send a one-off test notification to all registered devices'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: scripts/notify
        run: npm install
      - name: Send notifications
        working-directory: scripts/notify
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST: ${{ github.event.inputs.test }}
        run: node index.js
